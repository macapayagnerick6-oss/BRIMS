<div class="reset-password-page">
  <div class="reset-password-card card">
    <div class="reset-password-logo assemble assemble--1">
      <img class="logo" src="/assets/images/FOR-DASHBOARD.png" alt="Logo" />
    </div>
    <h1 class="reset-password-title assemble assemble--2">Reset Password</h1>
    <p class="reset-password-subtitle assemble assemble--3">Enter your new password below.</p>

    @if (!success) {
      <form (ngSubmit)="onSubmit()" class="reset-password-form">
        <div class="form-group input-icon assemble assemble--4">
          <label for="email">Email</label>
          <span class="icon">✉</span>
          <input
            id="email"
            type="email"
            class="form-control"
            [(ngModel)]="email"
            name="email"
            placeholder="Email"
            autocomplete="email"
            [disabled]="true"
          />
        </div>
        <div class="form-group input-icon assemble assemble--5">
          <label for="password">New Password</label>
          <span class="icon">🔒</span>
          <input
            id="password"
            type="password"
            class="form-control"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter new password"
            autocomplete="new-password"
            [disabled]="loading"
          />
        </div>
        <div class="form-group input-icon assemble assemble--6">
          <label for="confirmPassword">Confirm New Password</label>
          <span class="icon">🔒</span>
          <input
            id="confirmPassword"
            type="password"
            class="form-control"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="Confirm new password"
            autocomplete="new-password"
            [disabled]="loading"
          />
        </div>
        @if (error) {
          <p class="reset-password-error assemble assemble--7">{{ error }}</p>
        }
        <button type="submit" class="btn btn--primary reset-password-btn assemble assemble--8" [disabled]="loading">
          @if (loading) {
            Resetting...
          } @else {
            Reset Password
          }
        </button>
        <a (click)="backToLogin()" class="back-link assemble assemble--9">Back to Login</a>
      </form>
    } @else {
      <div class="success-message assemble assemble--3">
        <div class="success-icon assemble assemble--4">✓</div>
        <h2 class="assemble assemble--5">Password Reset Successful</h2>
        <p class="assemble assemble--6">Your password has been reset successfully. Redirecting to login...</p>
      </div>
    }
  </div>
</div>
