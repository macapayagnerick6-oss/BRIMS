<div class="requests-page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Requests</h1>
      <p class="muted">Certificate and clearance requests from residents.</p>
    </div>
  </div>

  <div class="table-wrap card">
    <table class="table">
      <thead>
        <tr>
          <th>Type</th>
          <th>Purpose</th>
          <th>Status</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (r of requests; track r.id) {
          <tr>
            <td>{{ r.type }}</td>
            <td>{{ r.purpose }}</td>
            <td>
              <span
                class="badge"
                [ngClass]="{
                  'badge--success': r.status === 'Approved',
                  'badge--warning': r.status === 'Pending' || r.status === 'For Review' || r.status === 'Rejected'
                }"
              >
                {{ r.status }}
              </span>
            </td>
            <td>{{ r.date }}</td>
            <td class="actions-cell">
              <div class="actions-cell__buttons">
                <a [routerLink]="['../requests', r.id]" class="btn btn--sm btn--primary">View Details</a>
                @if (isAdmin) {
                  <button
                    type="button"
                    class="btn btn--sm btn--outline"
                    (click)="archiveRequest(r)"
                  >
                    Archive
                  </button>
                }
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
