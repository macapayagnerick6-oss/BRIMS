<div class="login-page">
  <div class="login-card card">
    <div class="login-logo assemble assemble--1">
      <img class="logo" src="/assets/images/FOR-DASHBOARD.png" alt="Logo" loading="eager" decoding="async" />
    </div>
    <h1 class="login-title assemble assemble--2">Barangay Resident Information Management System</h1>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group assemble assemble--3">
        <label for="email">Email or Username</label>
        <input
          id="email"
          type="text"
          class="form-control"
          [(ngModel)]="email"
          name="email"
          placeholder="Email or Username"
          autocomplete="username"
          [attr.aria-invalid]="error ? true : null"
          [attr.aria-describedby]="error ? 'login-error' : null"
        />
      </div>
      <div class="form-group assemble assemble--4">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            class="form-control"
            [(ngModel)]="password"
            name="password"
            placeholder="Password"
            autocomplete="current-password"
            [attr.aria-invalid]="error ? true : null"
            [attr.aria-describedby]="error ? 'login-error' : null"
          />
          <button
            type="button"
            class="password-toggle"
            (click)="toggleShowPassword()"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
            [title]="showPassword ? 'Hide password' : 'Show password'"
          >
            @if (showPassword) {
              <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
      </div>
      <div class="login-options assemble assemble--5">
        <label class="remember-me">
          <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
          <span>Remember me</span>
        </label>
      </div>
      @if (error) {
        <p id="login-error" class="login-error assemble assemble--6" role="alert">{{ error }}</p>
      }
      <button
        type="submit"
        class="btn btn--primary login-btn assemble assemble--7"
        [disabled]="loading"
      >
        @if (loading) {
          <span class="btn-spinner" aria-hidden="true"></span>
          <span>Signing in...</span>
        } @else {
          Sign In
        }
      </button>
      <a (click)="onForgotPassword()" class="forgot-link assemble assemble--8" role="button">Forgot password?</a>
    </form>

    <p class="login-help assemble assemble--9">
      Need help? <a routerLink="/contact" class="help-link">Contact the barangay</a>
    </p>
  </div>
</div>
